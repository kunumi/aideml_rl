# Minimal single-turn GRPO smoke config (1 GPU, tiny model, verifier reward).

pretrain: Qwen/Qwen2.5-0.5B-Instruct

dataset: data/openrlhf_smoke/grpo_prompts.jsonl
input_key: messages
apply_chat_template: true

train:
  algorithm: grpo
  reward_func_path: aide/rlhf/grpo_reward_entrypoint.py
  async_enable: false

max_epochs: 1
learning_rate: 1.0e-6
batch_size: 1
micro_train_batch_size: 1
max_len: 512

output_dir: checkpoints/openrlhf_smoke_grpo
