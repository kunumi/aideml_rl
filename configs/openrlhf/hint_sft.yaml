# Supervised fine-tuning for the AIDE hindsight controller (action + hint JSON).
# Reference config for OpenRLHF namespaced CLI flags (see scripts/openrlhf/train_hint_sft.sh).

model:
  #model_name_or_path: Qwen/Qwen3-4B-Thinking-2507
  model_name_or_path: Qwen/Qwen3.5-9B
  gradient_checkpointing_enable: true

data:
  dataset: data/heuristic_runs/hint_controller/sft.jsonl
  input_key: messages
  apply_chat_template: true
  max_len: 8192

train:
  max_epochs: 1
  batch_size: 16
  micro_batch_size: 4

adam:
  lr: 2.0e-5

ckpt:
  output_dir: checkpoints/aide_hint_controller_sft

ds:
  zero_stage: 3

logger:
  logging_steps: 1
  wandb:
    key: true
    project: aide_rl
    run_name: hint_controller_sft



