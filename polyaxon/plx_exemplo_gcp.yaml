version: 1.1
kind: component
name: training-gcp
description: Exemplo de job de treinamento rodando no GCP com GPU A100.

inputs:
  # Parâmetro obrigatório: precisa ser passado sempre
  - name: train_pairs
    description: Pares "dataset,task" separados por ponto-e-vírgula para treino.
    type: str

  - name: eval_pairs
    description: Pares "dataset,task" separados por ponto-e-vírgula para avaliação.
    type: str

  # Parâmetros opcionais: têm valor padrão, mas podem ser sobrescritos
  - name: lr
    description: Learning rate do otimizador.
    type: float
    isOptional: true

  - name: epochs
    description: Número de épocas de treinamento.
    type: int
    isOptional: true
    value: 10

  - name: wandb_project
    description: Nome do projeto no W&B para registrar os experimentos.
    type: str
    isOptional: true
    value: meu-projeto

cache:
  disable: true  # desabilita cache de resultados (recomendado para treinamento)

termination:
  maxRetries: 0  # não retenta automaticamente em caso de falha

run:
  kind: job

  # connections: serviços externos que o job precisa acessar.
  # Esses nomes precisam estar cadastrados no cluster do Polyaxon.
  connections: [gcs-artifacts, docker-connection, wandb-connection]

  environment:
    # nodeSelector: em qual tipo de máquina o job vai rodar.
    # No GCP temos a100-2gpus disponível.
    nodeSelector:
      polyaxon: a100-2gpus

  container:
    image: "us-central1-docker.pkg.dev/k-supercomputing/k-images/kspace:latest"

    # workingDir: o diretório onde seu código foi feito upload (via --upload).
    workingDir: "{{ globals.run_artifacts_path }}/uploads/src"

    resources:
      limits:
        nvidia.com/gpu: "1"  # solicita 1 GPU para o job

    env:
      - name: GOOGLE_APPLICATION_CREDENTIALS
        value: /plx-context/.gc/gc-secret.json
      - name: TEAM_WANDB
        value: franciscokunumi-universidade-federal-de-minas-gerais
      - name: WANDB_PROJECT
        value: "{{ wandb_project }}"

    command:
      - sh
      - "-c"
      - >
        python main.py
        --train_pairs "{{ train_pairs }}"
        --eval_pairs "{{ eval_pairs }}"
        {% if lr is not none %}--lr {{ lr }}{% endif %}
        {% if epochs is not none %}--epochs {{ epochs }}{% endif %}
        --output_dir {{ globals.run_outputs_path }}
