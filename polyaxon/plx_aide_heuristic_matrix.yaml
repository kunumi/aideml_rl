version: 1.1
kind: operation
name: aide-heuristic-ctu-grid
description: >
  Grid over CTU tasks (task_index). Each run uses --seed auto (next unused seed
  on HF) and uploads logs to runs/<task_name>/seed<N>/.

pathRef: ./plx_aide_heuristic_gcp.yaml

params:
  task_offset:
    value: 0
  steps:
    value: 35
  seed:
    value: auto

matrix:
  kind: grid
  concurrency: 8
  params:
    task_index:
      kind: range
      # 75 data rows in data/ctu_datasets_info.csv (indices 0..74)
      value: "0:75:1"
