version: 1.1
kind: component
name: openrlhf-probe-axia
description: >
  Minimal GPU probe for axia/default. No code upload, no venv, no smoke script.
  Only checks that the pytorch image starts, nvidia-smi works, and torch sees CUDA.
  Use this to isolate scheduling/image/GPU issues from upload/workingDir/script issues.

queue: axia/default

cache:
  disable: true

termination:
  maxRetries: 0

run:
  kind: job

  container:
    image: "pytorch/pytorch:2.11.0-cuda12.6-cudnn9-devel"

    # Intentionally no workingDir and no connections — uses the image default cwd.

    resources:
      requests:
        cpu: "2"
        memory: "8Gi"
      limits:
        cpu: "4"
        memory: "16Gi"
        nvidia.com/gpu: "1"

    env:
      - name: PYTHONUNBUFFERED
        value: "1"

    command:
      - sh
      - -c
      - |
        echo "=== probe: container up ==="
        echo "hostname=$(hostname)"
        echo "pwd=$(pwd)"
        id
        echo "=== python ==="
        which python3 || which python
        python3 --version
        echo "=== nvidia-smi ==="
        nvidia-smi -L
        nvidia-smi --query-gpu=index,name,memory.total,driver_version --format=csv,noheader
        echo "NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-not set}"
        echo "CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-not set}"
        echo "=== pytorch ==="
        python3 -c "import sys, torch; print('python', sys.version.split()[0]); print('torch', torch.__version__); print('cuda_available', torch.cuda.is_available()); print('cuda_device_count', torch.cuda.device_count()); print('cuda_device0', torch.cuda.get_device_name(0) if torch.cuda.is_available() else 'n/a')"
        echo "=== probe ok ==="
